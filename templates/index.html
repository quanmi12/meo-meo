<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Boeing VIP Checker</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #020617, #000);
    color: #e2e8f0;
    font-family: 'Segoe UI', sans-serif;
}

h1 {
    text-align: center;
    color: #38bdf8;
    font-size: 40px;
    margin-top: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.money {
    font-size: 50px;
    color: #22c55e;
    text-align: center;
    margin-bottom: 20px;
}

.filter {
    text-align: center;
    margin-bottom: 25px;
}

.filter input, .filter select {
    padding: 12px 16px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    margin-right: 5px;
}

.filter button {
    background: #38bdf8;
    border: none;
    padding: 12px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.card {
    background: rgba(15,23,42,0.7);
    border: 1px solid rgba(56,189,248,0.3);
    border-radius: 15px;
    overflow: hidden;
}

.row {
    display: flex;
    justify-content: space-between;
    padding: 14px 16px;
}

.row:hover {
    background: rgba(255,255,255,0.03);
}

.price {
    color: #22c55e;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

    <h1>💰 MONEY</h1>
    <div class="money">${{ "%.2f"|format(total or 0) }}</div>

    <!-- FILTER -->
    <div class="filter">
        <form method="get">
            <input type="date" name="date" value="{{ selected_date }}">
            
            <select name="mode">
                <option value="day" {% if mode=='day' %}selected{% endif %}>Theo ngày</option>
                <option value="month" {% if mode=='month' %}selected{% endif %}>Theo tháng</option>
            </select>

            <button type="submit">Xem</button>
        </form>
    </div>

    <!-- GAME -->
    <div class="card">

        <!-- HEADER -->
        <div class="row" onclick="toggleGame()" style="cursor:pointer;">
            <div>🎮 Game A</div>
            <div class="price">${{ "%.2f"|format(total or 0) }}</div>
        </div>

        <!-- LIST -->
        <div id="gameList" style="display:none;">
            {% for game, d in result.items() %}
            <div class="row" style="border-top:1px solid rgba(255,255,255,0.05);">
                <div>{{ game }}</div>
                <div class="price">${{ "%.2f"|format(d["price"]) }}</div>
            </div>
            {% endfor %}
        </div>

    </div>

</div>

<script>
function toggleGame() {
    const el = document.getElementById("gameList");
    el.style.display = (el.style.display === "none") ? "block" : "none";
}

// chống cache + auto update
setInterval(() => {
    window.location.href = window.location.pathname + "?t=" + Date.now();
}, 10000);
</script>

</body>
</html>
