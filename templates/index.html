<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Boeing VIP Checker</title>

    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at top, #020617, #000);
            color: #e2e8f0;
            font-family: 'Segoe UI', sans-serif;
        }

        h1 {
            text-align: center;
            color: #38bdf8;
            font-size: 40px;
            margin-top: 20px;
        }

        h2 {
            margin: 30px 20px 10px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        /* CARD GỌN HƠN */
        .card {
            background: rgba(15,23,42,0.7);
            border: 1px solid rgba(56,189,248,0.3);
            border-radius: 15px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        /* HEADER 1 DÒNG */
        .row {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            cursor: pointer;
        }

        .price {
            color: #22c55e;
            font-weight: bold;
        }

        .count {
            color: #94a3b8;
            font-size: 14px;
        }

        .money {
            font-size: 50px;
            color: #22c55e;
            text-align: center;
        }

        /* DETAIL ẨN/MỞ */
        .detail {
            display: none;
            padding: 12px 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        /* DATE TO HƠN */
        input, select, button {
            padding: 12px 16px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            margin-right: 5px;
        }

        button {
            background: #38bdf8;
            cursor: pointer;
            color: black;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- MONEY -->
    <h1>💰 MONEY</h1>
    <div class="money">${{ "%.2f"|format(total or 0) }}</div>

    <!-- FILTER -->
    <div style="text-align:center; margin-bottom:20px;">
        <form method="get">
            <input type="date" name="date" value="{{ selected_date }}">
            
            <select name="mode">
                <option value="day" {% if mode=='day' %}selected{% endif %}>Theo ngày</option>
                <option value="month" {% if mode=='month' %}selected{% endif %}>Cả tháng</option>
            </select>

            <button type="submit">Xem</button>
        </form>
    </div>

    <!-- GAME -->
    <h2>🎮 GAME</h2>

    {% for game, d in result.items() %}
    <div class="card">

        <!-- 1 DÒNG -->
        <div class="row" onclick="toggleDetail('game{{ loop.index }}')">
            <div><b>{{ game }}</b></div>
            <div class="price">${{ "%.2f"|format(d["price"]) }}</div>
        </div>

        <!-- DETAIL -->
        <div id="game{{ loop.index }}" class="detail">
            <div class="count">Số lần: {{ d["count"] }}</div>
            <div class="count">Tổng tiền: ${{ "%.2f"|format(d["price"]) }}</div>
        </div>

    </div>
    {% endfor %}

</div>

<!-- JS -->
<script>
function toggleDetail(id) {
    const el = document.getElementById(id);

    // đóng hết trước (accordion)
    document.querySelectorAll(".detail").forEach(d => {
        if (d.id !== id) d.style.display = "none";
    });

    // toggle cái đang bấm
    el.style.display = (el.style.display === "block") ? "none" : "block";
}

// giữ nguyên auto reload
setInterval(() => {
    window.location.reload();
}, 10000);
</script>

</body>
</html>
