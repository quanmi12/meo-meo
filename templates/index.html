<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Boeing VIP Checker</title>

<style>
body {
    margin: 0;
    background: #020617;
    color: #e2e8f0;
    font-family: 'Segoe UI', sans-serif;
}

h1 {
    text-align: center;
    color: #38bdf8;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #0f172a;
    border: 1px solid #1e293b;
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 15px;
}

.price {
    color: #22c55e;
    font-weight: bold;
}

/* bảng */
.table {
    width: 100%;
    margin-top: 10px;
    border-collapse: collapse;
}

.table th, .table td {
    padding: 8px;
    border-bottom: 1px solid #1e293b;
    text-align: left;
}

.table th {
    color: #94a3b8;
}
</style>
</head>

<body>

<div class="container">

    <h1>💰 MONEY</h1>
    <h1 style="color:#22c55e">${{ "%.2f"|format(total or 0) }}</h1>

    <!-- filter -->
    <form method="get" style="text-align:center; margin-bottom:20px;">
        <input type="date" name="date" value="{{ selected_date }}">
        <select name="mode">
            <option value="day" {% if mode=="day" %}selected{% endif %}>Theo ngày</option>
            <option value="month" {% if mode=="month" %}selected{% endif %}>Theo tháng</option>
        </select>
        <button>Xem</button>
    </form>

    <h2>🎮 GAME</h2>

    {% for game, d in result.items() %}
    <div class="card">

        <!-- header -->
        <div style="display:flex; justify-content:space-between;">
            <b>{{ game }}</b>
            <div class="price">${{ "%.2f"|format(d["price"]) }}</div>
        </div>

        <!-- bảng chi tiết -->
        <table class="table">
            <tr>
                <th>Giá</th>
                <th>pack</th>
            </tr>

            {% for item in d["items"] %}
            <tr>
                <td>{{ item.price }}</td>
                <td>{{ item.count }}</td>
            </tr>
            {% endfor %}
        </table>

    </div>
    {% endfor %}

</div>

<script>
setInterval(() => {
    window.location.reload();
}, 10000);
</script>

</body>
</html>
