<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Boeing VIP Checker</title>

    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at top, #020617, #000);
            color: #e2e8f0;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* 🌌 nền glow */
        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(56,189,248,0.15) 0%, transparent 70%);
            animation: pulse 4s infinite;
            z-index: -1;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 0.7; }
            100% { opacity: 0.3; }
        }

        h1 {
            text-align: center;
            color: #38bdf8;
            font-size: 40px;
            text-shadow: 0 0 20px #38bdf8;
            margin-top: 20px;
        }

        h2 {
            color: #94a3b8;
            margin: 30px 20px 10px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: rgba(15,23,42,0.7);
            border: 1px solid rgba(56,189,248,0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        /* glow chạy */
        .card::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: linear-gradient(120deg, transparent, rgba(56,189,248,0.3), transparent);
            transform: rotate(25deg);
            top: -50%;
            left: -50%;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(25deg); }
            100% { transform: translateX(100%) rotate(25deg); }
        }

        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px rgba(56,189,248,0.5);
        }

        .row {
            display: flex;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }

        .price {
            color: #22c55e;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px #22c55e;
        }

        .count {
            color: #64748b;
            font-size: 13px;
            margin-top: 5px;
            position: relative;
            z-index: 1;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #1e293b;
            transition: 0.2s;
        }

        .history-item:hover {
            background: rgba(56,189,248,0.1);
        }

        .top-box {
            text-align: center;
            margin-bottom: 20px;
        }

        .money {
            font-size: 50px;
            color: #22c55e;
            text-shadow: 0 0 20px #22c55e;
            animation: glowMoney 2s infinite alternate;
        }

        @keyframes glowMoney {
            from { text-shadow: 0 0 10px #22c55e; }
            to { text-shadow: 0 0 30px #22c55e; }
        }

    </style>
</head>

<body>

<div class="container">

    <div class="top-box">
        <h1>💰 MONEY TODAY</h1>
        <div class="money">${{ "%.2f"|format(total or 0) }}</div>
    </div>

    <h2>🎮 GAME</h2>

    {% for game, d in result.items() %}
    <div class="card">
        <div class="row">
            <div><b>{{ game }}</b></div>
            <div class="price">${{ "%.2f"|format(d["price"]) }}</div>
        </div>
        <div class="count">Số lần: {{ d["count"] }}</div>
    </div>
    {% endfor %}

    <h2>📅 HISTORY</h2>

    {% for day, amount in history.items() %}
    <div class="history-item">
        <div>{{ day }}</div>
        <div class="price">${{ "%.2f"|format(amount) }}</div>
    </div>
    {% endfor %}

</div>

<!-- 🔄 auto reload -->
<script>
    setInterval(() => {
        window.location.reload();
    }, 10000);
</script>

</body>
</html>
