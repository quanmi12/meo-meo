<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money</title>

<style>
body {
    background: #020617;
    color: white;
    font-family: Arial;
    margin: 0;
}

.header {
    text-align: center;
    padding: 20px;
}

.money {
    font-size: 45px;
    color: #22c55e;
    font-weight: bold;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 15px;
}

.group {
    background: #0f172a;
    border-radius: 12px;
    overflow: hidden;
}

.group-header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
}

.total {
    color: #22c55e;
}

.item {
    display: flex;
    justify-content: space-between;
    padding: 10px 15px;
    border-top: 1px solid #1e293b;
}
</style>
</head>

<body>

<div class="header">
    <div class="money">$<span id="total">{{ total }}</span></div>
</div>

<div class="container">
    <div class="group">
        <div class="group-header">
            <div>🎮 Game</div>
            <div class="total">$<span id="groupTotal">{{ total }}</span></div>
        </div>

        <div id="list">
            {% for game, money in result.items() %}
            <div class="item">
                <div>{{ game }}</div>
                <div>${{ "%.2f"|format(money) }}</div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<script>
// gọi lại server mỗi 5s (KHÔNG reload)
setInterval(async () => {
    try {
        const res = await fetch(window.location.href);
        const text = await res.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(text, "text/html");

        document.getElementById("list").innerHTML =
            doc.getElementById("list").innerHTML;

        document.getElementById("total").innerText =
            doc.getElementById("total").innerText;

        document.getElementById("groupTotal").innerText =
            doc.getElementById("groupTotal").innerText;

    } catch (e) {
        console.log("Update lỗi:", e);
    }
}, 5000);
</script>

</body>
</html>
