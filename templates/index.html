<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Meo Meo</title>

    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at top, #020617, #000);
            color: #e2e8f0;
            font-family: 'Segoe UI', sans-serif;
        }

        h1 {
            text-align: center;
            color: #38bdf8;
            font-size: 40px;
            text-shadow: 0 0 20px #38bdf8;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .money {
            text-align: center;
            font-size: 50px;
            color: #22c55e;
            text-shadow: 0 0 20px #22c55e;
        }

        .card {
            background: rgba(15,23,42,0.7);
            border: 1px solid rgba(56,189,248,0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .row {
            display: flex;
            justify-content: space-between;
        }

        .price {
            color: #22c55e;
            font-weight: bold;
        }

        .date-box {
            text-align: center;
            margin: 20px 0;
        }

        input, select, button {
            padding: 8px;
            border-radius: 8px;
            border: none;
            margin: 5px;
        }

        input, select {
            background: #0f172a;
            color: #38bdf8;
        }

        button {
            background: #38bdf8;
            cursor: pointer;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #1e293b;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>💰 MONEY</h1>
    <div class="money">${{ "%.2f"|format(total or 0) }}</div>

    <div class="date-box">
        <form method="get">
            <select name="mode">
                <option value="day" {% if mode == "day" %}selected{% endif %}>Theo ngày</option>
                <option value="month" {% if mode == "month" %}selected{% endif %}>Cả tháng</option>
            </select>

            <input type="date" name="date" value="{{ selected_date if mode == 'day' else '' }}">

            <button type="submit">Xem</button>
        </form>
    </div>

    <h2>🎮 GAME</h2>

    {% for game, d in result.items() %}
    <div class="card">
        <div class="row">
            <div>{{ game }}</div>
            <div class="price">${{ "%.2f"|format(d["price"]) }}</div>
        </div>
        <div>Số lần: {{ d["count"] }}</div>
    </div>
    {% endfor %}

    <h2>📅 HISTORY</h2>

    {% for day, amount in history.items() %}
    <div class="history-item">
        <div>{{ day }}</div>
        <div class="price">${{ "%.2f"|format(amount) }}</div>
    </div>
    {% endfor %}

</div>

<script>
    setInterval(() => {
        const url = new URL(window.location.href);
        window.location.href = url.toString();
    }, 10000);
</script>

</body>
</html>
